# Risk parameters that agents can adjust.
# Values here OVERRIDE the base config/config.yaml when present.
# Only the Risk Monitor and Strategy agents should modify this file.

overrides:
  risk:
    min_confidence: 0.60
    max_position_pct: 0.15
    max_deployed_pct: 0.75

changelog:
  - timestamp: "2026-04-20 22:10:00"
    agent: "strategy"
    change: "Raised min_confidence floor from 0.50 to 0.55"
    reason: "Day 1 observation: the only sub-0.60 confidence trade (GOLDBEES @ 0.58) also had the lowest R:R (1.61) among today's 4 orders. Modestly raising the floor nudges the decision layer away from marginal-conviction trades while remaining non-restrictive (all 4 of today's orders still clear 0.55)."
  - timestamp: "2026-04-22 12:30:00"
    agent: "risk_monitor"
    change: "Lowered max_position_pct from 0.20 to 0.15"
    reason: "BFSI concentration is building across correlated financial names: MAHABANK (9.78% of capital) + PNBHOUSING (7.87%) = 17.65% of capital in financials, and an OPEN AUBANK BUY (7.35% on fill) would push BFSI to ~25% of total capital and ~67% of the deployed book once pending orders settle. No single name is yet near the 20% cap, but given the visible pattern of stacking rate-sensitive financials, a tighter 0.15 per-name ceiling places a firmer lid on compound single-name + single-sector risk before any individual position becomes dominant. Non-punitive: all existing holdings and OPEN orders remain comfortably inside the new cap, so no liquidation or order cancellation is forced — it only constrains sizing of future entries."
  - timestamp: "2026-04-22 13:00:00"
    agent: "risk_monitor"
    change: "Raised min_confidence from 0.55 to 0.60"
    reason: "In the 30 min since the 12:30 tightening, the strategy layer added a SECOND AUBANK BUY lot (56 @ 1047 = 5.86%) on top of the existing OPEN AUBANK 70 @ 1050 (7.35%) — combined AUBANK pending is now 13.21% of capital, sitting just under the 0.15 per-name cap that was set 30 minutes earlier. Projected BFSI exposure if all pending orders fill has climbed from 25% (at 12:30) to 30.87% of total capital (~63% of deployed book). The 12:30 max_position_pct lever is working (no breach) but is not decelerating the stacking pattern — two-lot sizing up to just-under-cap is a direct response pattern to the sizing ceiling. min_confidence is the complementary lever: it gates *whether* a new entry qualifies at all, not just *how large*. Raising from 0.55 to 0.60 adds resistance against further marginal-conviction adds (BFSI or otherwise) without cancelling any in-flight OPEN order (they were already accepted under the old threshold). Non-punitive by construction: today's filled entries all cleared 0.60 historically on Day 1 inspection, so this is unlikely to starve the strategy layer of legitimate signal."
  - timestamp: "2026-04-22 14:30:00"
    agent: "risk_monitor"
    change: "Added max_deployed_pct override 0.80 → 0.75"
    reason: "Executing the explicit 13:30/14:00 trigger plan: 'if projected deployment climbs past ~73-75%, add max_deployed_pct = 0.75 override as a hard ceiling ahead of the 80% base cap'. In the 14:00→14:30 window, projected deployment on full OPEN-book fill jumped 68.89% → 78.56% (+9.67 pp in 30 min) as two new buys were admitted: HINDUNILVR 20 @ ₹2372 (filled, FMCG) and ADANIPOWER 230 @ ₹214 (OPEN, Power). The ADANIPOWER add is a 3rd Power/PSU name stacking on TORNTPOWER (filled) + NTPC (pending), which independently trips the cluster-emergence condition flagged at 14:00 (Power cluster now 15.92% of capital on full fill, three names). Setting the cap below the projected full-fill (0.75 < 0.7856) pauses admission of any NEW entry while grandfathering the five in-flight OPEN orders (same non-punitive pattern as the 12:30 and 13:00 overrides — no cancellations, just a closed door to additions). This one lever subsumes the cluster-aware response: with no deployment slots available, no further Power (or FMCG, or any sector) name can slot in until OPEN-book fills land, freeing assessable capacity only on a later tick. Did NOT also tighten min_risk_reward (1.5) or daily_loss_limit_pct (0.03) — the 14:00 rejection rationale for both still holds (R:R quality is not the live risk vector; realized P&L is ₹0 so loss-gate tightening is noise). Did NOT further tighten max_position_pct (0.15) because trigger (c) — BFSI % of deployed re-inflecting UP — did not fire; BFSI share of deployed is flat tick-over-tick."
  - timestamp: "2026-04-22 16:00:00"
    agent: "strategy"
    change: "No numeric override changes; held min_confidence=0.60, max_position_pct=0.15, max_deployed_pct=0.75 for Day-1 EOD review. Logged structural findings into system_prompt changes (order hygiene, cluster discipline, deployment hysteresis)."
    reason: "Post-market review of Day 1 (2026-04-22): 13 BUY attempts / 0 SELLs — pure accumulation with unrealized P&L -₹2,844 (-0.28%). Two clear structural failures dominate, and both are better addressed at the prompt layer than via a new numeric knob. (1) Duplicate/near-duplicate orders on the same symbol within the same session: AUBANK was submitted three times (70@1050 OPEN, 56@1047 OPEN, 50@1050 FILL) and NESTLEIND twice (50@1415 OPEN, 35@1410 FILL). This is not a confidence/sizing issue — the decision layer was simply not consulting its own OPEN-order book before re-emitting. A numeric cap (e.g., max_working_orders_per_symbol=1) would act as a guardrail but the root cause is behavioral, so it's addressed by the new ORDER HYGIENE section of the system prompt. (2) Zero position-management activity — no MODIFY, no EXIT, no trailing-SL decisions across 8 filled holdings on a day where the market moved materially. The existing priority-order text was evidently too soft; strengthened by adding a duplicate-order walk and an explicit 'what do I do with what I already own?' default question. The three risk_monitor overrides earlier today are kept as-is for overnight: they are binding against the concentration profile the book is carrying into tomorrow and should be re-evaluated at premarket once OPEN-book fills and overnight gaps are observable. Did NOT tighten min_risk_reward or daily_loss_limit_pct — same rationale as 15:00/15:30 ticks (R:R quality isn't the live vector; realized-loss telemetry is zero). Did NOT raise min_confidence to 0.65 — today's 0.72 trades (MAHABANK -2.13%, NESTLEIND -1.01%) were among the larger losers, so confidence is not yet a reliable outcome predictor on a 1-day sample. Will re-visit once realized-P&L data accumulates."
