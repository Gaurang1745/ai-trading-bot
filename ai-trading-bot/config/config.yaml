# AI Trading Bot Configuration

experiment:
  start_date: "2026-03-01"
  duration_days: 30
  starting_capital: 100000

trading:
  exchanges: ["NSE", "BSE"]
  products: ["CNC", "MIS"]
  max_trades_per_day: 12
  max_position_pct: 0.20
  max_deployed_pct: 0.80
  min_cash_buffer_pct: 0.20
  max_cnc_hold_days: 15
  unwind_phase_days: 5
  min_stock_price: 20
  min_daily_volume_cr: 1.0
  no_new_mis_after: "14:30"
  mis_squareoff_start: "15:00"
  mis_squareoff_hard_deadline: "15:10"
  mis_emergency_market_close: "15:12"

risk:
  daily_loss_limit_pct: 0.03
  drawdown_reduce_pct: 0.10
  drawdown_halt_pct: 0.15
  default_sl_pct: 0.02
  min_sl_pct: 0.005
  max_sl_pct: 0.05
  min_confidence: 0.50
  min_risk_reward: 1.5

resilience:
  claude_safe_mode_timeout_min: 15
  sl_health_check_interval_min: 5
  duplicate_order_window_min: 5
  max_prompt_tokens: 12000
  daily_backup_enabled: true
  backup_destination: "backups/"

corporate_actions:
  check_enabled: true
  exclude_on_exdate: true

pipeline:
  market_pulse_model: "claude-sonnet-4-5-20250929"
  market_pulse_interval_minutes: 30
  max_watchlist_size: 15
  min_watchlist_size: 3
  always_include_held: true
  watchlist_fallback: "previous"
  pulse_skip_if_stable: false
  pulse_skip_threshold_pct: 0.2
  bulk_indicator_refresh_minutes: 15
  top_movers_count: 10
  gap_threshold_pct: 2.0
  high_low_proximity_pct: 2.0

ai:
  decision_model: "claude-opus-4-6"
  analysis_model: "claude-sonnet-4-5-20250929"
  news_model: "claude-haiku-4-5-20251001"
  decision_interval_minutes: 30
  daily_candles_count: 15
  enable_prompt_caching: true

llm_pricing:
  usd_inr_rate: 84.0
  claude-opus-4-6:
    input_per_1m: 1260.00
    output_per_1m: 6300.00
    cache_read_per_1m: 126.00
    cache_create_per_1m: 1575.00
  claude-sonnet-4-5-20250929:
    input_per_1m: 252.00
    output_per_1m: 1260.00
    cache_read_per_1m: 25.20
    cache_create_per_1m: 315.00
  claude-haiku-4-5-20251001:
    input_per_1m: 67.20
    output_per_1m: 336.00
    cache_read_per_1m: 6.72
    cache_create_per_1m: 84.00

dhan:
  client_id: "${DHAN_CLIENT_ID}"
  access_token: "${DHAN_ACCESS_TOKEN}"

anthropic:
  api_key: "${ANTHROPIC_API_KEY}"

telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  chat_id: "${TELEGRAM_CHAT_ID}"

database:
  path: "data/trading_bot.db"

veto:
  enabled: false
  timeout_seconds: 60

backup:
  enabled: true
  local_dir: "backups/"
  keep_local_days: 7
  offsite_enabled: false
  offsite_remote: "gdrive:trading-bot-backups/"

logging:
  level: "INFO"
  log_dir: "logs/"
  save_prompts: true
  save_responses: true

etfs:
  approved:
    - NIFTYBEES
    - BANKBEES
    - GOLDBEES
    - ITBEES
    - PSUBNKBEES
    - JUNIORBEES
    - LIQUIDBEES
    - CPSEETF
    - SILVERBEES
    - PHARMABEES
    - MOM50
